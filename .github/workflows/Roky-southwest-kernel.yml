name: Lavender 4.19 KSU Next NetHunter PRO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # ================= DEPENDENCIES =================
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git curl wget zip bc bison flex build-essential \
        libssl-dev libelf-dev libncurses5-dev clang llvm lld python3 cpio

    # ================= KERNEL =================
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/pix106/android_kernel_xiaomi_lavender-4.19.git kernel-source

    # ================= CLANG =================
    - name: Clone Clang
      run: |
        git clone --depth=1 https://github.com/ClangBuiltLinux/llvm-project clang

    # ================= KSU NEXT =================
    - name: Inject KernelSU Next
      run: |
        cd kernel-source
        curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

    # ================= ENV =================
    - name: Setup env
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV

    # ================= DEFCONFIG =================
    - name: Build defconfig
      run: |
        cd kernel-source
        export PATH=$PWD/../clang/bin:$PATH

        make O=out ARCH=arm64 lavender_defconfig

    # ================= REAL NETHUNTER PATCH =================
    - name: Apply NetHunter FULL BASE
      run: |
        cd kernel-source

        cat <<EOF >> arch/arm64/configs/lavender_defconfig

# ===== NetHunter Core =====
CONFIG_CFG80211=y
CONFIG_MAC80211=y
CONFIG_WIRELESS=y

# ===== WiFi Injection Base =====
CONFIG_ATH9K_HTC=m
CONFIG_ATH10K=m
CONFIG_RTL8187=m
CONFIG_RTL8XXXU=m

# ===== Bluetooth =====
CONFIG_BT=y
CONFIG_BT_HCIBTUSB=m
CONFIG_BT_HCIUART=m
CONFIG_BT_HIDP=y

# ===== USB HID Gadget (NetHunter HID) =====
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_F_HID=y
CONFIG_USB_F_HID=y
CONFIG_USB_G_HID=y

# ===== Android Kernel features =====
CONFIG_ANDROID_BINDERFS=y
CONFIG_OVERLAY_FS=y
CONFIG_DEVTMPFS=y

# ===== Security / root helpers =====
CONFIG_KSU=y
EOF

    # ================= BUILD =================
    - name: Build Kernel
      run: |
        cd kernel-source
        export PATH=$PWD/../clang/bin:$PATH

        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 -j$(nproc)

    # ================= ANYKERNEL =================
    - name: Package
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
        cd AnyKernel3

        cp ../kernel-source/out/arch/arm64/boot/Image.gz-dtb . 2>/dev/null || \
        cp ../kernel-source/out/arch/arm64/boot/Image .

        zip -r9 Lavender-KSU-NH-PRO.zip *

    # ================= UPLOAD =================
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Lavender-KSU-NH-PRO
        path: AnyKernel3/Lavender-KSU-NH-PRO.zip
