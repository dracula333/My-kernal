name: SouthWest Kernel 4.19.325 NG (Full NetHunter + KSU Next)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ---------------- DEPENDENCIES ----------------
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y git curl wget zip bc bison flex build-essential \
        libssl-dev libelf-dev libncurses5-dev clang llvm lld python3 cpio

    # ---------------- KERNEL SOURCE ----------------
    - name: Clone SouthWest Kernel
      run: |
        git clone --depth=1 https://github.com/pix106/android_kernel_xiaomi_southwest-4.19.git kernel-source

    # ---------------- CLANG ----------------
    - name: Clone Clang
      run: |
        git clone --depth=1 https://github.com/ClangBuiltLinux/llvm-project clang

    # ---------------- KERNELSU NEXT ----------------
    - name: Inject KernelSU Next
      run: |
        cd kernel-source
        curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

    # ---------------- KERNEL CONFIG PATCH ----------------
    - name: Apply NetHunter + Bluetooth + WiFi + HID Config
      run: |
        cd kernel-source
        CONFIG=arch/arm64/configs/lavender_defconfig

        # ---------------- WIFI ----------------
        echo "CONFIG_CFG80211=y" >> $CONFIG
        echo "CONFIG_MAC80211=y" >> $CONFIG
        echo "CONFIG_WIRELESS=y" >> $CONFIG

        echo "CONFIG_ATH9K_HTC=m" >> $CONFIG
        echo "CONFIG_ATH9K_HW=m" >> $CONFIG
        echo "CONFIG_ATH10K=m" >> $CONFIG
        echo "CONFIG_RTL8187=m" >> $CONFIG
        echo "CONFIG_RTL8XXXU=m" >> $CONFIG
        echo "CONFIG_RTL8192CU=m" >> $CONFIG

        # ---------------- BLUETOOTH ----------------
        echo "CONFIG_BT=y" >> $CONFIG
        echo "CONFIG_BT_HCIUART=m" >> $CONFIG
        echo "CONFIG_BT_HCIBTUSB=m" >> $CONFIG
        echo "CONFIG_BT_BNEP=m" >> $CONFIG
        echo "CONFIG_BT_RFCOMM=m" >> $CONFIG
        echo "CONFIG_BT_HIDP=m" >> $CONFIG

        # ---------------- USB HID (NETHUNTER) ----------------
        echo "CONFIG_USB_CONFIGFS=y" >> $CONFIG
        echo "CONFIG_USB_CONFIGFS_F_HID=y" >> $CONFIG
        echo "CONFIG_USB_F_HID=y" >> $CONFIG

        echo "CONFIG_HID=y" >> $CONFIG
        echo "CONFIG_HID_GENERIC=y" >> $CONFIG
        echo "CONFIG_HIDRAW=y" >> $CONFIG

        # ---------------- ANDROID / DYNAMIC SAFE ----------------
        echo "CONFIG_ANDROID_BINDERFS=y" >> $CONFIG
        echo "CONFIG_DEVTMPFS=y" >> $CONFIG
        echo "CONFIG_DEVTMPFS_MOUNT=y" >> $CONFIG
        echo "CONFIG_OVERLAY_FS=y" >> $CONFIG

        # ---------------- KERNELSU ----------------
        echo "CONFIG_KSU=y" >> $CONFIG

    # ---------------- BUILD ----------------
    - name: Build Kernel
      run: |
        cd kernel-source
        export PATH=$PWD/../clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang

        make O=out lavender_defconfig
        make -j$(nproc) O=out CC=clang

    # ---------------- ANYKERNEL ----------------
    - name: Package Kernel
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git
        cd AnyKernel3

        cp ../kernel-source/out/arch/arm64/boot/Image.gz-dtb . 2>/dev/null || \
        cp ../kernel-source/out/arch/arm64/boot/Image .

        zip -r9 SouthWest-Kali-NG-KernelSU.zip *

    # ---------------- UPLOAD ----------------
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SouthWest-Kernel-FULL
        path: AnyKernel3/SouthWest-Kali-NG-KernelSU.zip
