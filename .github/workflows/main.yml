name: Build Lunaris OS Kernel (Android 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout WorkSpace
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Clone Kernel Source & Clang
      run: |
        git clone --depth=1 https://github.com -b southwest kernel-source
        cd kernel-source
        git clone --depth=1 https://gitlab.com -b 17 clang

    - name: Integrate KernelSU Next & Inject Nethunter Drivers
      run: |
        cd kernel-source
        # KernelSU Next Setup
        curl -LSs "https://githubusercontent.com" | bash -s next
        
        # Injecting Drivers into Defconfig
        CONFIG_FILE="arch/arm64/configs/lavender_defconfig"
        echo "CONFIG_ANDROID_BINDERFS=y" >> $CONFIG_FILE
        echo "CONFIG_SYSFS_VNODE=y" >> $CONFIG_FILE
        echo "CONFIG_WIRELESS=y" >> $CONFIG_FILE
        echo "CONFIG_CFG80211=y" >> $CONFIG_FILE
        echo "CONFIG_MAC80211=y" >> $CONFIG_FILE
        echo "CONFIG_CFG80211_WEXT=y" >> $CONFIG_FILE
        echo "CONFIG_ATH_CARDS=y" >> $CONFIG_FILE
        echo "CONFIG_ATH6KL=m" >> $CONFIG_FILE
        echo "CONFIG_RTL8187=m" >> $CONFIG_FILE
        echo "CONFIG_RTL_CARDS=m" >> $CONFIG_FILE
        echo "CONFIG_RTL8192CU=m" >> $CONFIG_FILE
        echo "CONFIG_RTL8xxxU=m" >> $CONFIG_FILE
        echo "CONFIG_USB_G_ANDROID=y" >> $CONFIG_FILE
        echo "CONFIG_USB_CONFIGFS=y" >> $CONFIG_FILE
        echo "CONFIG_USB_CONFIGFS_F_HID=y" >> $CONFIG_FILE
        echo "CONFIG_USB_F_HID=y" >> $CONFIG_FILE
        echo "CONFIG_BT_HCIBTUSB=m" >> $CONFIG_FILE
        echo "CONFIG_BT_HCIUART=m" >> $CONFIG_FILE

    - name: Compile Kernel
      run: |
        cd kernel-source
        export PATH="$(pwd)/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        make O=out lavender_defconfig
        make -j$(nproc --all) O=out CC=clang

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com AnyKernel3
        cd AnyKernel3
        rm -rf Image.gz-dtb
        cp ../kernel-source/out/arch/arm64/boot/Image.gz-dtb .
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
        zip -r9 ../Lunaris-SouthWest-Nethunter-KernelSU.zip *

    - name: Upload Flashable Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: Lunaris-OS-Flashable-Kernel
        path: Lunaris-SouthWest-Nethunter-KernelSU.zip
